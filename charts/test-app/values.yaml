# charts/test-app/values.yaml

# List of API services to deploy — each gets its own Deployment, Service, and Ingress rule
services:
  - name: api1
    host: api1.local
  - name: api2
    host: api2.local
  - name: api3
    host: api3.local

# Application image (same image for all services, differentiated by SERVICE_NAME env var)
image:
  repository: test-app
  tag: latest
  pullPolicy: IfNotPresent

# Number of pod replicas per service
replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Ingress configuration
ingress:
  controller: traefik   # "nginx" or "traefik"
                      # When switching: also flip ingress-nginx.enabled / traefik.enabled below
  tls: true

  # --- Certificate mode (pick one) ---
  #
  # Mode 1 — Auto-generate self-signed cert (default)
  #   Set generateCert: true. Helm creates a self-signed cert covering all service hosts.
  #   Cert is stored as a K8s Secret and reused on helm upgrade.
  #
  # Mode 2 — Pre-created secret via kubectl
  #   Set generateCert: false, leave externalCert.crt and externalCert.key empty.
  #   Run before helm install:
  #     kubectl create secret tls test-app-tls --cert=your.crt --key=your.key -n default
  #   WARNING: If switching FROM generateCert: true, run helm upgrade first (to drop Helm
  #   ownership of the old secret), then create the new secret with kubectl.
  #
  # Mode 3 — Paste cert into values
  #   Set generateCert: false, paste PEM content into externalCert.crt and externalCert.key.
  #   Helm creates the K8s Secret from these values.
  #
  # Mode 4 — Auto-generate cert + corporate CA (combined trust)
  #   Set generateCert: true AND paste your root CA into corporateCA.
  #   Helm generates the self-signed cert for the ingress (same as Mode 1).
  #   Pod trust stores get BOTH: the self-signed cert (for pod-to-pod calls) AND
  #   the corporate CA (for any other HTTPS calls that use certs signed by your CA).

  # sslRedirect controls whether the ingress redirects HTTP → HTTPS (default: false).
  # Applies to both controllers:
  #   nginx:   adds nginx.ingress.kubernetes.io/ssl-redirect: "false" annotation
  #   traefik: creates a redirectScheme Middleware on the HTTP entrypoint
  # false = port 80 and 443 both work simultaneously (default)
  # true  = HTTP (80) redirects to HTTPS (443)
  sslRedirect: false

  # injectHostAliases controls whether pods get /etc/hosts entries for service hostnames.
  # true  = pods can resolve api1.local etc. via the ingress ClusterIP (required for pod-to-pod calls)
  # false = disable for environments where DNS already resolves these names (e.g. corporate DNS, WAF setups)
  injectHostAliases: true

  generateCert: true
  certDays: 3650         # self-signed cert validity in days (only used when generateCert: true)

  # Mode 3: paste PEM content here (leave empty for modes 1 and 2)
  externalCert:
    crt: ""              # PEM cert  (-----BEGIN CERTIFICATE-----)
    key: ""              # PEM key   (-----BEGIN PRIVATE KEY-----)

  # Corporate / custom CA root cert for pod trust store injection.
  # Paste the PEM of your root or intermediate CA here.
  # Modes 2 & 3: set this so pods trust certs signed by your CA.
  # Mode 4: set this alongside generateCert: true — both the corporate CA and the
  #   self-signed cert are appended to pod trust stores.
  corporateCA: ""

# ingress-nginx subchart — set enabled: false when switching to traefik
ingress-nginx:
  enabled: false
  controller:
    service:
      type: LoadBalancer

# traefik subchart — set enabled: true when switching to traefik
traefik:
  enabled: true
  service:
    type: LoadBalancer

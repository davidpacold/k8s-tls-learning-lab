# charts/test-app/templates/deployment.yaml
{{- $svcName := ternary (printf "%s-traefik" .Release.Name) (printf "%s-ingress-nginx-controller" .Release.Name) (eq .Values.ingress.controller "traefik") }}
{{- $ingressSvc := lookup "v1" "Service" .Release.Namespace $svcName }}
{{- $ingressIP := "" }}
{{- if $ingressSvc }}{{- $ingressIP = $ingressSvc.spec.clusterIP }}{{- end }}
{{- /* needsCAInjection: true when we have a CA cert to append to the pod trust store */}}
{{- $needsCAInjection := or $.Values.ingress.corporateCA $.Values.ingress.generateCert }}
{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    app: {{ $.Release.Name }}-{{ .name }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Release.Name }}-{{ .name }}
  template:
    metadata:
      labels:
        app: {{ $.Release.Name }}-{{ .name }}
    spec:
      {{- if and $ingressIP $.Values.ingress.injectHostAliases }}
      hostAliases:
        - ip: {{ $ingressIP }}
          hostnames:
            {{- range $.Values.services }}
            - {{ .host }}
            {{- end }}
      {{- end }}
      {{- if $needsCAInjection }}
      initContainers:
        - name: trust-ca
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /etc/ssl/certs/ca-certificates.crt /updated-certs/ca-certificates.crt
              {{- if $.Values.ingress.corporateCA }}
              cat /corporate-ca/ca.crt >> /updated-certs/ca-certificates.crt
              {{- end }}
              {{- if $.Values.ingress.generateCert }}
              cat /custom-cert/tls.crt >> /updated-certs/ca-certificates.crt
              {{- end }}
          volumeMounts:
            {{- if $.Values.ingress.corporateCA }}
            - name: corporate-ca
              mountPath: /corporate-ca
              readOnly: true
            {{- end }}
            {{- if $.Values.ingress.generateCert }}
            - name: tls-cert
              mountPath: /custom-cert
              readOnly: true
            {{- end }}
            - name: ca-bundle
              mountPath: /updated-certs
      {{- end }}
      containers:
        - name: api
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $.Values.service.targetPort }}
          env:
            - name: SERVICE_NAME
              value: {{ .name | quote }}
          {{- if $needsCAInjection }}
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-certificates.crt
              readOnly: true
          {{- end }}
      {{- if $needsCAInjection }}
      volumes:
        {{- if $.Values.ingress.corporateCA }}
        - name: corporate-ca
          configMap:
            name: {{ printf "%s-ca" $.Release.Name }}
        {{- end }}
        {{- if $.Values.ingress.generateCert }}
        - name: tls-cert
          secret:
            secretName: {{ printf "%s-tls" $.Release.Name }}
            items:
              - key: tls.crt
                path: tls.crt
        {{- end }}
        - name: ca-bundle
          emptyDir: {}
      {{- end }}
{{- end }}

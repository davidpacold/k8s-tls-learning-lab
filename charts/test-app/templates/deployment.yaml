# charts/test-app/templates/deployment.yaml
{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    app: {{ $.Release.Name }}-{{ .name }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Release.Name }}-{{ .name }}
  template:
    metadata:
      labels:
        app: {{ $.Release.Name }}-{{ .name }}
    spec:
      initContainers:
        - name: trust-ca
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /etc/ssl/certs/ca-certificates.crt /updated-certs/ca-certificates.crt
              cat /custom-cert/tls.crt >> /updated-certs/ca-certificates.crt
          volumeMounts:
            - name: tls-cert
              mountPath: /custom-cert
              readOnly: true
            - name: ca-bundle
              mountPath: /updated-certs
      containers:
        - name: api
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $.Values.service.targetPort }}
          env:
            - name: SERVICE_NAME
              value: {{ .name | quote }}
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-certificates.crt
              readOnly: true
      volumes:
        - name: tls-cert
          secret:
            secretName: {{ printf "%s-tls" $.Release.Name }}
            items:
              - key: tls.crt
                path: tls.crt
        - name: ca-bundle
          emptyDir: {}
{{- end }}

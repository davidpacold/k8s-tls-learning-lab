{{- $secretName := printf "%s-tls" .Release.Name }}
{{- if .Values.ingress.generateCert }}
{{- /* ------------------------------------------------------------------ */}}
{{- /* Mode 1: Auto-generate self-signed cert                              */}}
{{- /* Use lookup to reuse existing cert on helm upgrade (no churn)        */}}
{{- /* ------------------------------------------------------------------ */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
{{- else }}
{{- $hosts := list }}
{{- range .Values.services }}
{{- $hosts = append $hosts .host }}
{{- end }}
{{- $cert := genSelfSignedCert "test-app" nil $hosts (.Values.ingress.certDays | int) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- else if and .Values.ingress.externalCert.crt .Values.ingress.externalCert.key }}
{{- /* ------------------------------------------------------------------ */}}
{{- /* Mode 3: Cert values pasted into values.yaml                         */}}
{{- /* Helm creates the Secret from the PEM content                        */}}
{{- /* ------------------------------------------------------------------ */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.externalCert.crt | b64enc }}
  tls.key: {{ .Values.ingress.externalCert.key | b64enc }}
{{- end }}
{{- /* ------------------------------------------------------------------ */}}
{{- /* Mode 2: generateCert: false + empty externalCert                    */}}
{{- /* Secret must be pre-created via: kubectl create secret tls ...       */}}
{{- /* Nothing rendered — Helm does not manage the secret                  */}}
{{- /* ------------------------------------------------------------------ */}}
